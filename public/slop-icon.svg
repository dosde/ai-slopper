<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="20" fill="#0f0f1a"/>
  <rect width="100" height="100" rx="20" fill="url(#grad)"/>
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
  </defs>
  <!-- Robot head -->
  <rect x="25" y="20" width="50" height="45" rx="8" fill="#1a1a2e" stroke="#a78bfa" stroke-width="2"/>
  <!-- Eyes -->
  <circle cx="37" cy="38" r="7" fill="#7c3aed"/>
  <circle cx="63" cy="38" r="7" fill="#7c3aed"/>
  <circle cx="37" cy="38" r="3" fill="#a78bfa"/>
  <circle cx="63" cy="38" r="3" fill="#a78bfa"/>
  <!-- Mouth -->
  <rect x="32" y="51" width="36" height="6" rx="3" fill="#ec4899"/>
  <!-- Antenna -->
  <line x1="50" y1="20" x2="50" y2="10" stroke="#a78bfa" stroke-width="2"/>
  <circle cx="50" cy="8" r="4" fill="#fbbf24"/>
  <!-- Body -->
  <rect x="35" y="67" width="30" height="20" rx="5" fill="#1a1a2e" stroke="#a78bfa" stroke-width="2"/>
  <!-- Arms -->
  <rect x="15" y="70" width="18" height="10" rx="5" fill="#1a1a2e" stroke="#a78bfa" stroke-width="2"/>
  <rect x="67" y="70" width="18" height="10" rx="5" fill="#1a1a2e" stroke="#a78bfa" stroke-width="2"/>
</svg>
